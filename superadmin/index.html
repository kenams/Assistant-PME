<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Superadmin - Assistant Support IT</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Superadmin</div>
      <div class="actions">
        <span id="sessionBadge" class="session-badge hidden"></span>
        <button id="refreshBtn" class="btn">Rafraichir</button>
        <button id="logoutBtn" class="btn ghost">Deconnexion</button>
      </div>
    </header>

    <main>
      <section class="card" id="loginCard">
        <h2>Connexion superadmin</h2>
        <form id="loginForm" class="form">
          <input name="email" type="email" placeholder="Email" required />
          <input name="password" type="password" placeholder="Mot de passe" required />
          <button class="btn primary" type="submit">Se connecter</button>
          <p id="loginStatus" class="status"></p>
        </form>
        <div class="quick-login">
          <a
            id="quickAdminBtn"
            class="btn ghost"
            href="/auth/quick-admin?redirect=/superadmin/"
          >
            Connexion admin rapide
          </a>
          <p class="note">Mode test local uniquement.</p>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <h3>Vue globale</h3>
          <button id="overviewBtn" class="btn ghost">Refresh</button>
        </div>
        <div class="grid" id="overviewGrid"></div>
      </section>

      <section class="card">
        <div class="card-header">
          <h3>Tenants</h3>
          <div class="actions-inline">
            <button id="tenantsReloadBtn" class="btn ghost">Recharger</button>
            <button id="globalBackupBtn" class="btn ghost">Backup global</button>
            <label class="btn ghost" for="globalRestoreInput">Restore global</label>
            <input id="globalRestoreInput" type="file" />
          </div>
        </div>
        <form id="tenantForm" class="form two-columns">
          <input name="name" placeholder="Nom tenant" required />
          <input name="plan" placeholder="Plan" value="starter" />
          <input name="admin_email" placeholder="Email admin" type="email" required />
          <input
            name="admin_password"
            placeholder="Mot de passe admin"
            type="password"
            required
          />
          <button class="btn primary" type="submit">Creer tenant</button>
          <p id="tenantStatus" class="status"></p>
        </form>
        <div class="table-wrap">
          <table id="tenantsTable">
            <thead>
              <tr>
                <th>Nom</th>
                <th>Plan</th>
                <th>ID</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <input id="tenantImportInput" type="file" />
      </section>

      <section class="card">
        <div class="card-header">
          <h3>Logs superadmin</h3>
          <button id="auditRefreshBtn" class="btn ghost">Refresh</button>
        </div>
        <div class="table-wrap">
          <table id="auditTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>Action</th>
                <th>User</th>
                <th>Meta</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span>Assistant Support IT</span>
      <span>Concu par Kah-Digital</span>
    </footer>

    <script src="superadmin.min.js" defer></script>
  </body>
</html>
