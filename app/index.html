<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Assistant Support IT</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="/app/styles.css" />
    <meta http-equiv="refresh" content="0; url=/app/login/" />
  </head>
  <body class="simple-landing with-bottom-footer">
    <main class="landing-card">
      <div class="hero-badge" id="landingBadge">Support IT</div>
      <div class="lang-switcher" data-lang-switcher>
        <button class="lang-btn" type="button" data-lang="fr">FR</button>
        <button class="lang-btn" type="button" data-lang="en">EN</button>
        <button class="lang-btn" type="button" data-lang="es">ES</button>
      </div>
      <img
        class="brand-logo"
        data-brand-logo
        data-default-logo="/app/assets/logo.svg"
        src="/app/assets/logo.svg"
        alt="Kah-Digital"
      />
      <h1 id="landingTitle">Assistant Support IT</h1>
      <p id="landingSubtitle">
        Chargement de la page de connexion. Si rien ne s'affiche, utilisez les
        liens ci-dessous.
      </p>
      <div class="landing-actions">
        <a class="btn primary" href="/app/login/" id="landingLoginBtn"
          >Connexion utilisateur</a
        >
        <a class="btn ghost" href="/app/user/" id="landingUserBtn"
          >Espace utilisateur</a
        >
        <a class="btn ghost" href="/app/admin/" id="landingAdminBtn"
          >Espace admin</a
        >
      </div>
    </main>
    <footer class="page-footer">
      <button class="btn ghost" type="button" data-logout id="landingLogoutBtn">
        Deconnexion
      </button>
      <a
        class="footer-note footer-link"
        id="footerCredit"
        href="https://kah-digital-site.vercel.app/"
        target="_blank"
        rel="noopener"
      >
        Concu par Kah-Digital
      </a>
    </footer>
    <script src="/app/i18n.js?v=20260310" defer></script>
    <script src="/app/app.js?v=20260310" defer></script>
    <script src="/app/logout.js?v=20260310" defer></script>
  </body>
</html>
