<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kah-Digital CRM - Assistant Support IT</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Kah-Digital CRM</div>
      <div class="actions">
        <span id="sessionBadge" class="session-badge hidden"></span>
        <button id="presentationToggle" class="btn ghost" type="button">
          Mode presentation
        </button>
        <button id="refreshBtn" class="btn">Rafraichir</button>
        <button id="exportBtn" class="btn ghost">Exporter leads</button>
        <button id="logoutBtn" class="btn ghost">Deconnexion</button>
      </div>
    </header>
    <div id="statusBanner" class="status-banner hidden"></div>

    <main>
      <section class="card" id="loginCard">
        <h2>Connexion</h2>
        <form id="loginForm" class="form">
          <input name="email" type="email" placeholder="Email" required />
          <input name="password" type="password" placeholder="Mot de passe" required />
          <button class="btn primary" type="submit">Se connecter</button>
          <p id="loginStatus" class="status"></p>
        </form>
        <div class="quick-login">
          <a
            id="quickAdminBtn"
            class="btn ghost"
            href="/auth/quick-admin?redirect=/crm/"
          >
            Connexion admin rapide
          </a>
          <p class="note">Mode test local uniquement.</p>
        </div>
      </section>

      <section class="card" id="pipelineCard">
        <h3>Pipeline prospects</h3>
        <div class="filters">
          <input id="searchInput" placeholder="Recherche rapide" />
          <select id="statusFilter">
            <option value="">Tous</option>
            <option value="new">new</option>
            <option value="contacted">contacted</option>
            <option value="demo">demo</option>
            <option value="proposal">proposal</option>
            <option value="won">won</option>
            <option value="lost">lost</option>
          </select>
        </div>
        <div class="table-wrap">
          <table id="leadsTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>Nom</th>
                <th>Email</th>
                <th>Entreprise</th>
                <th>Status</th>
                <th>Prochaine action</th>
                <th>Notes</th>
                <th>Owner</th>
                <th>Maj</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="footer">Developed by Kah-Digital</footer>

    <script src="crm.min.js" defer></script>
  </body>
</html>
